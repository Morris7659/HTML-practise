<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & Support</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Support</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="processors.html">Processors</a></li>
                <li><a href="OS-Histoty.html">OS History</a></li>
                <li><a href="maintenance.html">Maintenance</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Get in Touch</h2>
            <p>Have a question about a microprocessor or need help with OS maintenance? Fill out the form below.</p>

            <form action="#" method="post" id="support_form">
                <div class="form-group">
                     <label for="name">Full Name:</label>
                     <input type="text" id="name" name="user_name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                     <ladel for="email">Email Address:</ladel>
                     <input type="text" id="email" name="user_email" placeholder="example.gmail.com" required>
                </div>

                <div class="form-group">
                     <label for="category">Inquiry Category:</label>
                     <select id="category" name="inquiry_type">
                        <option value="hardware">Hardware Identification</option>
                        <option value="OS">OS Troubleshooting</option>
                        <option value="info">General Info</option>
                     </select>
                </div>

                <div class="form-group">
                     <label for="message">Your Message:</label>
                     <textarea id="message" name="user_message" rows="10" placeholder="How can we help you?"></textarea>
                </div>

                     <button type="submit">Send Inquiry</button>
            </form>
        </section>
    </main>
    
</body>
</html>
